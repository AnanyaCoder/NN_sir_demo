<!DOCTYPE html><html><head><meta charset="UTF-8"/><link rel="stylesheet" href="styles.css"/></head>
<body data-scene="gate"><div id="screen"><div class="grain"></div><div id="wipe" class="wipe"></div>
<div id="gate" class="gate"><div class="gate-inner"><div class="gate-eyebrow" id="gateEyebrow"></div><h1 class="gate-title" id="gateTitle"></h1><button id="startBtn" class="start-btn" disabled>x</button></div></div>
<div class="brand-fixed"><span class="bird"><img class="bmark" src="images/bodhan_mark.png"></span><span class="brand-text">Tutor<b>Bot</b></span></div>
<main class="stage" id="stage" hidden><div class="visual-layer" id="visualLayer"></div><div class="scrim"></div>
<div class="caption-layer" id="captionLayer"><div class="cap-kicker" id="capKicker"></div><h2 class="cap-title" id="capTitle"></h2><div class="cap-sub" id="capSub"></div><div class="cap-chips" id="chips"></div><div class="cap-extra" id="sceneExtra"></div></div>
<button class="ml-toggle" id="mlToggle" hidden><span id="mlLabel"></span></button><div class="rail" id="rail"><span class="rail-fill" id="railFill"></span></div><div class="timecode" id="timecode"></div><div class="chapter" id="chapter"></div></main></div>
<audio id="music" src="audio/music.mp3"></audio><audio id="clipLessons" src="audio/tts_ashutosh.mp3"></audio><audio id="clipAdmin" src="audio/tts_priya.mp3"></audio>
<script src="reel.js"></script><script src="app.js"></script>
<script>(async function(){const q=new URLSearchParams(location.search),id=q.get("scene"),at=+(q.get("at"));for(let i=0;i<40&&document.getElementById("startBtn").disabled;i++)await new Promise(r=>setTimeout(r,80));const g=document.getElementById("gate");g.classList.add("hide");g.style.display="none";document.getElementById("stage").hidden=false;const i=Reel.scenes.findIndex(s=>s.id===id);Reel.goToScene(i);Reel.paused=true;document.getElementById("wipe").classList.remove("active");const sc=Reel.scenes[i];for(let t=0;t<=at;t+=80)sc.update(t);})();</script></body></html>
